spring:
  application:
    name: healthcare-app-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  flyway:
    enabled: false

security:
  jwt:
    secret: test-secret-key-that-is-at-least-32-chars-long!!
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

server:
  port: 0
